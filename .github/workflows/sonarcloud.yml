name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: ["**"]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 
      - name: Install dependencies
        run: npm ci
      - name: Test and coverage
        run: npx jest --coverage # Changed from 'npm jest' to 'npx jest'
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets. SONAR_TOKEN }}
