sonar.projectKey=AlessandroB1298_loggica
sonar.organization=alessandrob1298
sonar.host.url=https://sonarcloud.io

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=loggica
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

sonar.sources=app,components,lib
sonar.tests=__tests__

# Match TypeScript and React files in your tests folder
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Path to the coverage report generated by 'npx jest --coverage'
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude configuration files and build artifacts from the scan
sonar.exclusions=**/node_modules/**,**/coverage/**,**/.next/**,**/*.config.*
